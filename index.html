<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lime 電子カルテ</title>
<style>
:root {
  --primary: #3d7a5a;
  --primary-light: #52b788;
  --primary-dark: #2d5a42;
  --sidebar-bg: #1e2d26;
  --sidebar-text: #c8ddd4;
  --sidebar-active: #3d7a5a;
  --bg: #f8faf9;
  --surface: #ffffff;
  --border: #e8f0ec;
  --text: #1a1a2e;
  --text-muted: #6b7c74;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 12px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
  --danger: #e05555;
  --warning: #e9950f;
  --success: #52b788;
  --info: #5b9bd5;
  --sidebar-width: 220px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1a14;
    --surface: #1a2820;
    --border: #2a3d32;
    --text: #e8f5ee;
    --text-muted: #8aab98;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
    --shadow-md: 0 2px 12px rgba(0,0,0,0.4);
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); }
.app-layout { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; z-index: 100; transition: width var(--transition); }
.sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-logo img { width: 56px; height: 56px; object-fit: contain; border-radius: 8px; display: block; margin: 0 auto 8px; }
.sidebar-nav { flex: 1; padding: 12px 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; color: var(--sidebar-text); cursor: pointer; border-radius: 8px; margin: 2px 8px; transition: background var(--transition), color var(--transition); font-size: 13px; font-weight: 500; min-height: 44px; user-select: none; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: var(--sidebar-active); color: #fff; }
.nav-item svg { flex-shrink: 0; width: 18px; height: 18px; }
.nav-label { white-space: nowrap; }

/* MAIN */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm); }
.top-bar-left { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-muted); }
.top-bar-right { display: flex; align-items: center; gap: 12px; }
.last-updated { font-size: 11px; color: var(--text-muted); }
#app-container { flex: 1; overflow-y: auto; padding: 20px 24px; transition: opacity 0.25s ease, transform 0.25s ease; }

/* CARDS */
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px; margin-bottom: 16px; transition: transform var(--transition), box-shadow var(--transition); }
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 700; color: var(--text); }
.card-body { }

/* KPI CARDS */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px; display: flex; align-items: center; gap: 14px; transition: transform var(--transition), box-shadow var(--transition); }
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.kpi-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.kpi-icon-blue { background: #e8f0fb; }
.kpi-icon-green { background: #e8f5ee; }
.kpi-icon-orange { background: #fef3e2; }
.kpi-icon-purple { background: #f3eef5; }
.kpi-value { font-size: 24px; font-weight: 800; color: var(--text); line-height: 1; }
.kpi-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.kpi-trend { font-size: 11px; margin-top: 4px; }
.kpi-trend.up { color: #52b788; }
.kpi-trend.down { color: #e05555; }

/* FILTER BAR */
.filter-bar { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 30; }
.filter-bar select, .filter-bar input { height: 36px; padding: 0 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 13px; outline: none; min-width: 120px; }
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--primary); }
.filter-clear-btn { height: 36px; padding: 0 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; white-space: nowrap; }
.filter-clear-btn:hover { background: var(--bg); color: var(--text); }

/* VIEW HEADER */
.view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.view-title { display: flex; align-items: center; gap: 10px; }
.view-title h1 { font-size: 20px; font-weight: 800; color: var(--text); }

/* CUSTOMERS LAYOUT */
.customers-layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
.customer-list-panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
.customer-list-header { padding: 12px; border-bottom: 1px solid var(--border); }
.search-input-wrap { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 10px; margin-bottom: 10px; }
.search-icon { color: var(--text-muted); font-size: 14px; }
.search-input { flex: 1; height: 36px; border: none; background: transparent; color: var(--text); font-size: 13px; outline: none; }
.status-filters { display: flex; flex-wrap: wrap; gap: 6px; }
.filter-btn { height: 28px; padding: 0 10px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; white-space: nowrap; transition: all var(--transition); }
.filter-btn.active, .filter-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; }
.customer-list-body { max-height: 600px; overflow-y: auto; }
.customer-card-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--transition); }
.customer-card-item:hover { background: var(--bg); }
.customer-card-item.selected { background: #e8f5ee; border-left: 3px solid var(--primary); }
.customer-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.customer-furigana { font-size: 10px; color: var(--text-muted); }
.customer-name-main { font-size: 14px; font-weight: 700; color: var(--text); }
.customer-card-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; flex-wrap: wrap; }
.concern-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.concern-tag { font-size: 10px; padding: 2px 7px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text-muted); }

/* STATUS BADGES */
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.status-新規 { background: #e8f0fb; color: #3a6db5; }
.status-来店 { background: #e8f5ee; color: #2d7a4f; }
.status-契約 { background: #fef3e2; color: #a06010; }
.status-フォロー中 { background: #f3eef5; color: #6b4a6a; }
.status-失客 { background: #fdeaea; color: #c03030; }

/* CUSTOMER DETAIL PANEL */
.customer-detail-panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px; }
.detail-header { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.detail-header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.detail-furigana { font-size: 11px; color: var(--text-muted); }
.detail-name { font-size: 22px; font-weight: 800; color: var(--text); }
.detail-header-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.info-item label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.info-item span { font-size: 13px; color: var(--text); }
.detail-section { margin-bottom: 16px; }
.detail-section-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.status-select-inline { padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer; }
.memo-area { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 13px; resize: vertical; outline: none; font-family: inherit; }
.memo-area:focus { border-color: var(--primary); }
.line-id-input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
.line-id-input:focus { border-color: var(--primary); }
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.treatment-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.treatment-table th { background: var(--bg); padding: 6px 8px; text-align: left; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
.treatment-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.line-sent-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.line-sent-yes { background: #e8f5ee; color: #2d7a4f; }
.line-sent-no { background: #fdeaea; color: #c03030; }

/* EMPTY STATE */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 15px; font-weight: 600; color: var(--text-muted); }
.empty-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 38px; padding: 0 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all var(--transition); white-space: nowrap; min-width: 44px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { height: 32px; padding: 0 12px; font-size: 12px; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-line { background: #06c755; color: #fff; }
.btn-line:hover { background: #05b04a; }
.btn-danger { background: var(--danger); color: #fff; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* FORMS */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
.form-label.required::after { content: ' *'; color: var(--danger); }
.form-input, .form-select, .form-textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 13px; outline: none; font-family: inherit; transition: border-color var(--transition); }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); }
.form-input.error, .form-textarea.error { border-color: var(--danger); }
.form-error-msg { font-size: 11px; color: var(--danger); margin-top: 3px; }
.form-textarea { resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-section { margin-bottom: 16px; }
.form-section-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.form-check { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
.section-divider { height: 1px; background: var(--border); margin: 16px 0; }
.customer-selector-bar { background: var(--surface); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.counseling-card, .past-records-card, .closing-result-form { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px; margin-bottom: 16px; }
.counseling-history-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.counseling-history-item:last-child { border-bottom: none; }
.counseling-history-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.counseling-history-content { font-size: 13px; color: var(--text); }

/* ANALYSIS */
.score-ring-container { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); border-radius: var(--radius); padding: 24px; display: flex; align-items: center; gap: 24px; margin-bottom: 16px; color: #fff; }
.score-ring-wrap { position: relative; flex-shrink: 0; }
.score-ring-wrap svg { transform: rotate(-90deg); }
.score-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.score-value { font-size: 28px; font-weight: 900; color: #fff; }
.score-unit { font-size: 11px; color: rgba(255,255,255,0.7); }
.score-state-label { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.score-description { font-size: 13px; opacity: 0.8; margin-bottom: 10px; }
.score-meta { display: flex; flex-direction: column; gap: 5px; }
.score-meta-item { display: flex; align-items: center; gap: 6px; font-size: 12px; opacity: 0.9; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.analysis-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
.analysis-card-header { padding: 12px 16px; font-size: 13px; font-weight: 700; color: var(--text); background: var(--bg); border-bottom: 1px solid var(--border); }
.analysis-card-body { padding: 14px 16px; }
.needs-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.needs-item:last-child { border-bottom: none; }
.needs-concern { font-size: 13px; font-weight: 600; color: var(--text); }
.needs-treatment { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.priority-badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.priority-HIGH { background: #fdeaea; color: #c03030; }
.priority-MEDIUM { background: #fef3e2; color: #a06010; }
.priority-LOW { background: #e8f5ee; color: #2d7a4f; }
.recommendation-card { background: var(--bg); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); }
.recommendation-card:last-child { margin-bottom: 0; }
.rec-name { font-size: 13px; font-weight: 700; color: var(--text); }
.rec-price { font-size: 15px; font-weight: 800; color: var(--primary); }
.rec-sessions { font-size: 11px; color: var(--text-muted); }
.rec-reason { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.rec-urgency { font-size: 11px; color: var(--warning); margin-top: 4px; }
.risk-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.risk-item:last-child { border-bottom: none; }
.risk-label { font-size: 12px; color: var(--text-muted); }
.risk-value { font-size: 12px; font-weight: 600; }
.risk-ok { color: var(--success); }
.risk-warn { color: var(--warning); }
.risk-danger { color: var(--danger); }
.ai-footer-note { font-size: 11px; color: var(--text-muted); padding: 10px; background: var(--bg); border-radius: var(--radius-sm); }

/* CLOSING */
.closing-layout { }
.closing-score-container { background: linear-gradient(135deg, #1e2d26, #3d7a5a); border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; color: #fff; }
.closing-score-label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
.closing-score-value { font-size: 40px; font-weight: 900; }
.closing-score-suffix { font-size: 16px; opacity: 0.7; }
.closing-score-details { flex: 1; margin-left: 24px; }
.closing-score-bar-wrap { background: rgba(255,255,255,0.2); border-radius: 10px; height: 8px; overflow: hidden; }
.closing-score-bar { height: 100%; background: #52b788; border-radius: 10px; transition: width 1s ease; }
.scenario-card { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
.scenario-tip { padding: 8px 12px; background: var(--bg); font-size: 12px; font-weight: 700; color: var(--text); border-bottom: 1px solid var(--border); }
.scenario-script { padding: 10px 12px; font-size: 13px; color: var(--text); position: relative; padding-right: 70px; }
.copy-btn { position: absolute; top: 8px; right: 8px; padding: 3px 8px; background: var(--primary); color: #fff; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; }
.result-options { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.result-option { height: 40px; padding: 0 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; transition: all var(--transition); }
.result-option:hover { border-color: var(--primary); }
.selected-success { background: #e8f5ee; border-color: var(--success); color: #2d7a4f; }
.selected-failure { background: #fdeaea; border-color: var(--danger); color: #c03030; }
.selected-pending { background: #fef3e2; border-color: var(--warning); color: #a06010; }

/* CONTRACTS */
.summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
.summary-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px; display: flex; align-items: center; gap: 14px; }
.summary-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.summary-icon-primary { background: #e8f5ee; }
.summary-icon-warning { background: #fef3e2; }
.summary-icon-info { background: #e8f0fb; }
.summary-value { font-size: 24px; font-weight: 800; color: var(--text); }
.summary-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.contracts-table-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; margin-bottom: 16px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { background: var(--bg); padding: 10px 12px; text-align: left; font-size: 11px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg); }
.no-data-row td { text-align: center; color: var(--text-muted); padding: 32px; }
.progress-bar-wrap { background: var(--border); border-radius: 10px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 10px; transition: width 0.8s ease; }
.progress-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.price-text { font-weight: 700; color: var(--text); }
.contract-status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.status-active { background: #e8f5ee; color: #2d7a4f; }
.status-expired { background: #fdeaea; color: #c03030; }
.alert-banner { background: #fff8e8; border: 1px solid var(--warning); border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 14px; font-size: 13px; color: #7a5000; }

/* FOLLOW-UP */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.tab-btn { height: 40px; padding: 0 16px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: -2px; transition: all var(--transition); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.followup-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px; margin-bottom: 16px; }
.message-type-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.msg-type-btn { height: 34px; padding: 0 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all var(--transition); }
.msg-type-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.line-warning { background: #fff8e8; border: 1px solid var(--warning); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: #7a5000; }
.coming-soon { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 40px; text-align: center; }
.coming-soon-icon { font-size: 40px; margin-bottom: 10px; }
.coming-soon-title { font-size: 16px; font-weight: 700; color: var(--text); }

/* RETROSPECTIVE */
.period-filter { display: flex; gap: 6px; margin-bottom: 16px; }
.period-btn { height: 32px; padding: 0 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all var(--transition); }
.period-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.kpi-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card-retro { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px; transition: transform var(--transition); }
.kpi-card-retro:hover { transform: translateY(-2px); }
.kpi-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 800; color: var(--text); }
.kpi-unit { font-size: 13px; font-weight: 400; color: var(--text-muted); }
.kpi-change { font-size: 11px; margin-top: 4px; }
.kpi-change.up { color: var(--success); }
.kpi-change.down { color: var(--danger); }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
.chart-header { padding: 12px 16px; font-size: 13px; font-weight: 700; color: var(--text); background: var(--bg); border-bottom: 1px solid var(--border); }
.chart-body { padding: 14px 16px; }
.h-bar-item { margin-bottom: 10px; }
.h-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text); margin-bottom: 4px; }
.h-bar-track { background: var(--border); border-radius: 10px; height: 8px; overflow: hidden; }
.h-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 10px; transition: width 0.8s ease; }
.donut-bars { }
.dist-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.dist-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dist-label { font-size: 12px; color: var(--text); width: 70px; flex-shrink: 0; }
.dist-bar-wrap { flex: 1; background: var(--border); border-radius: 10px; height: 6px; overflow: hidden; }
.dist-bar { height: 100%; border-radius: 10px; transition: width 0.8s ease; }
.dist-count { font-size: 12px; font-weight: 700; color: var(--text); width: 20px; text-align: right; }
.ranking-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.ranking-item:last-child { border-bottom: none; }
.rank-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.rank-1 { background: #ffd700; color: #7a5000; }
.rank-2 { background: #c0c0c0; color: #555; }
.rank-3 { background: #cd7f32; color: #fff; }
.rank-other { background: var(--border); color: var(--text-muted); }
.rank-name { flex: 1; font-size: 12px; color: var(--text); }
.rank-count { font-size: 12px; font-weight: 700; color: var(--text-muted); }
.lost-customers-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; margin-bottom: 16px; }
.improvement-list { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
.improvement-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.improvement-item:last-child { border-bottom: none; }
.improvement-icon { font-size: 20px; flex-shrink: 0; }
.improvement-text { font-size: 13px; color: var(--text); }

/* OPTIMIZATION */
.optimization-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.pattern-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
.pattern-header { padding: 12px 16px; font-size: 13px; font-weight: 700; color: #fff; }
.pattern-header-success { background: var(--primary); }
.pattern-header-fail { background: var(--danger); }
.pattern-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
.pattern-item:last-child { border-bottom: none; }
.pattern-bullet { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.bullet-success { background: var(--success); }
.bullet-fail { background: var(--danger); }
.action-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px; margin-bottom: 16px; }
.action-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.action-item:last-child { margin-bottom: 0; }
.action-num { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
.action-text { font-size: 13px; color: var(--text); padding-top: 3px; }
.ai-advice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
.advice-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px; }
.advice-icon { font-size: 24px; margin-bottom: 8px; }
.advice-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.advice-text { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.data-quality-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px; margin-bottom: 16px; }
.quality-item { margin-bottom: 12px; }
.quality-label-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text); margin-bottom: 4px; }
.quality-bar-wrap { background: var(--border); border-radius: 10px; height: 6px; overflow: hidden; }
.quality-bar { height: 100%; background: var(--primary); border-radius: 10px; transition: width 0.8s ease; }
.upgrade-banner { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; color: #fff; gap: 16px; }
.upgrade-text { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.upgrade-sub { font-size: 12px; opacity: 0.8; }

/* MODAL */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
#modal-overlay.hidden { display: none; }
#modal-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 90%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; z-index: 201; }
#modal-container.hidden { display: none; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 4px; }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* TOAST */
#toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: #fff; z-index: 300; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-lg); transition: opacity 0.3s ease; }
#toast.hidden { display: none; }
#toast.success { background: var(--success); }
#toast.error { background: var(--danger); }
#toast.warning { background: var(--warning); }
#toast.info { background: var(--info); }

/* SKELETON */
.skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.skeleton-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 20px; margin-bottom: 14px; }
.skeleton-line { height: 14px; margin-bottom: 10px; }
.skeleton-line.w-80 { width: 80%; }
.skeleton-line.w-60 { width: 60%; }
.skeleton-line.w-40 { width: 40%; }

/* AI RANKING */
.ai-ranking-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px; margin-bottom: 16px; }
.ai-ranking-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.ai-rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ai-rank-item:last-child { border-bottom: none; }
.ai-rank-medal { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.ai-rank-name { flex: 1; }
.ai-rank-name-main { font-size: 13px; font-weight: 700; color: var(--text); }
.ai-rank-status { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.ai-rank-score-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 80px; }
.ai-rank-score { font-size: 16px; font-weight: 800; }
.ai-rank-bar-wrap { width: 80px; background: var(--border); border-radius: 10px; height: 4px; }
.ai-rank-bar { height: 100%; border-radius: 10px; transition: width 0.8s ease; }

/* TEXT HELPERS */
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }

/* MOBILE NAV */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 150; }
.mobile-nav-inner { display: flex; }
.mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px; cursor: pointer; color: var(--text-muted); font-size: 10px; gap: 3px; min-height: 54px; transition: color var(--transition); border: none; background: transparent; }
.mobile-nav-item.active { color: var(--primary); }
.mobile-nav-item svg { width: 22px; height: 22px; }

/* RESPONSIVE */
@media (max-width: 1024px) {
  :root { --sidebar-width: 60px; }
  .nav-label { display: none; }
  .sidebar-logo img { display: none; }
  .sidebar-logo { padding: 16px 8px; }
  .nav-item { justify-content: center; padding: 11px; }
  .kpi-grid, .kpi-cards { grid-template-columns: repeat(2, 1fr); }
  .charts-grid, .optimization-grid { grid-template-columns: 1fr; }
  .ai-advice-grid { grid-template-columns: 1fr 1fr; }
  .customers-layout { grid-template-columns: 280px 1fr; }
  .analysis-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-nav { display: block; }
  #app-container { padding: 12px 14px 80px; }
  .top-bar { padding: 0 14px; }
  .customers-layout { grid-template-columns: 1fr; }
  .customer-detail-panel { display: none; }
  .customer-detail-panel.show { display: block; }
  .kpi-grid, .kpi-cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .charts-grid, .analysis-grid, .optimization-grid, .summary-cards { grid-template-columns: 1fr; }
  .ai-advice-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-bar select, .filter-bar input { width: 100%; }
  .closing-score-container { flex-direction: column; align-items: flex-start; }
  .closing-score-details { margin-left: 0; margin-top: 12px; width: 100%; }
  .data-table { font-size: 11px; }
  .data-table th, .data-table td { padding: 7px 8px; }
  .view-title h1 { font-size: 16px; }
  #toast { bottom: 70px; right: 14px; left: 14px; }
}
</style>

function analyzeCustomer(customerId) {

  const needs = customer.concerns.map(c => ({ concern: c, ...(needsMap[c] || { treatment: '総合フェイシャル', priority: 'MEDIUM' }) }));
  const recommendations = [];
  if (customer.concerns.includes('たるみ') || customer.concerns.includes('ほうれい線')) recommendations.push({ name: 'HAIFUリフトアッププラン', price: 25000, sessions: 6, reason: 'たるみ・ほうれい線への最短アプローチ', urgency: '今がベストタイミング' });

  if (recommendations.length === 0) recommendations.push({ name: 'メンテナンスコース（5回）', price: 65000, sessions: 5, reason: '現在のコース終了後もケアを継続', urgency: '早期申込割引あり' });
  const closingTips = [];

    closingTips.push({ tip: '施術効果を具体的に数値で見せる', script: '前回から比べてキメが〇%細かくなっています！このまま続けることで更に効果が持続しますよ。' });

  return { score, stateLabel, stateColor, needs, recommendations, closingTips, daysSinceVisit, contract, customer };

// API LAYER
let apiDataCache = { customers: null, lastFetch: null };
async function fetchFromGAS(action, params) {
  if (!USE_REAL_API) return null;
  let url = GAS_API_URL + '?action=' + encodeURIComponent(action);
  if (params) Object.keys(params).forEach(key => { url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]); });
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'GAS returned error');
    return json.data;
  } catch (err) { console.error('[GAS API] ' + action + ' 失敗:', err.message); return null; }
}
async function loadCustomersFromAPI() {
  if (!USE_REAL_API) return CUSTOMERS;
  const data = await fetchFromGAS('getCustomers');
  if (!data || !Array.isArray(data)) return CUSTOMERS;
  CUSTOMERS.length = 0; data.forEach(c => CUSTOMERS.push(c));
  CUSTOMERS = CUSTOMERS.filter(function(c) {
    if (!c.name || c.name === 'LINE新規') return false;
    return true;
  });
  apiDataCache.customers = CUSTOMERS.slice(); apiDataCache.lastFetch = new Date(); return CUSTOMERS;
}
async function loadContractsFromAPI() {
  if (!USE_REAL_API) return CONTRACTS;
  const data = await fetchFromGAS('getContracts');
  if (!data || !Array.isArray(data)) return CONTRACTS;
  CONTRACTS.length = 0; data.forEach(c => CONTRACTS.push(c)); return CONTRACTS;
}

function statusBadge(status) { return '<span class="status-badge status-' + status + '">' + status + '</span>'; }
function formatPrice(price) { return '¥' + Number(price).toLocaleString(); }
function formatDate(dateStr) { if (!dateStr) return '—'; const d = new Date(dateStr); return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0'); }
function customerInitial(name) { return name ? name.charAt(0) : '?'; }
function buildCustomerOptions(selectedId) { return CUSTOMERS.map(c => '<option value="' + c.id + '" ' + (c.id === selectedId ? 'selected' : '') + '>' + c.name + '（' + c.furigana + '）</option>').join(''); }
function escapeQuote(str) { return str.replace(/'/g, "\\'").replace(/\n/g, ' '); }

function applyFilters() {
  const shop = (document.getElementById('filter-shop') || {}).value || 'all';
  const status = (document.getElementById('filter-status') || {}).value || 'all';
  const search = ((document.getElementById('filter-search') || {}).value || '').toLowerCase();
  const period = (document.getElementById('filter-period') || {}).value || 'all';
  const now = new Date('2024-03-28');
  let filtered = getCustomers();
  if (shop !== 'all') filtered = filtered.filter(c => c.shop === shop);
  if (status !== 'all') filtered = filtered.filter(c => c.status === status);
  if (search) filtered = filtered.filter(c => c.name.toLowerCase().includes(search) || c.furigana.toLowerCase().includes(search) || c.phone.includes(search));
  if (period !== 'all') {
    filtered = filtered.filter(c => {
      const d = new Date(c.registeredDate);
      if (period === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      if (period === 'lastmonth') { const lm = new Date(now.getFullYear(), now.getMonth()-1, 1); return d.getMonth() === lm.getMonth() && d.getFullYear() === lm.getFullYear(); }
      if (period === '3months') { const cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth()-3); return d >= cutoff; }
      return true;
    });
  }
  const listEl = document.getElementById('customer-list');
  if (listEl) listEl.innerHTML = renderCustomerList(filtered, selectedCustomerId);
}

function clearFilters() {
  const ids = ['filter-shop','filter-status','filter-search','filter-period'];
  ids.forEach(id => { const el = document.getElementById(id); if (el) el.value = 'all'; });
  const searchEl = document.getElementById('filter-search');
  if (searchEl) searchEl.value = '';
  applyFilters();
}

function renderCustomerList(customers, selectedId) {
  if (customers.length === 0) return '<div class="empty-state" style="padding:40px 20px"><div class="empty-icon">🔍</div><div class="empty-text">該当する顧客が見つかりません</div></div>';
  return customers.map(c => `
    <div class="customer-card-item ${c.id === selectedId ? 'selected' : ''}" data-customer-id="${c.id}" onclick="selectCustomer('${c.id}')">
      <div class="customer-card-top">
        <div><div class="customer-furigana">${c.furigana}</div><div class="customer-name-main">${c.name}</div></div>
        ${statusBadge(c.status)}
      </div>
      <div class="customer-card-meta">
        <span>📞 ${c.phone}</span>
        <span>🗓 ${formatDate(c.lastVisit)}</span>
        <span>💆 ${c.treatmentCount}回</span>
      </div>
      <div class="concern-tags">${c.concerns.map(t => '<span class="concern-tag">' + t + '</span>').join('')}</div>
    </div>
  `).join('');
}

function renderEmptyDetail() {
  return '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">顧客を選択してください</div><div class="empty-sub">左のリストから顧客を選択すると詳細が表示されます</div></div>';
}

function selectCustomer(customerId) {
  selectedCustomerId = customerId;
  document.querySelectorAll('.customer-card-item').forEach(el => { el.classList.toggle('selected', el.dataset.customerId === customerId); });
  const panel = document.getElementById('customer-detail-panel');
  if (panel) panel.innerHTML = renderCustomerDetail(customerId);
}

async function handleStatusChange(customerId, status) {
  await apiUpdateStatus(customerId, status);
  showToast('ステータスを「' + status + '」に変更しました', 'success');
  const listEl = document.getElementById('customer-list');
  if (listEl) listEl.innerHTML = renderCustomerList(getCustomers(), customerId);
}

async function saveMemo(customerId) {
  const memo = document.getElementById('customer-memo').value;
  await apiUpdateMemo(customerId, memo);
  showToast('メモを保存しました', 'success');
}

async function saveLineId(customerId) {
  const lineId = document.getElementById('line-id-input').value;
  await apiUpdateLineId(customerId, lineId);
  showToast('LINE User IDを保存しました', 'success');
}

function goToViewWithCustomer(view, customerId) {
  selectedCustomerId = customerId;
  document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(n => { n.classList.toggle('active', n.dataset.view === view); });
  renderView(view);
}

function filterCustomerList(query, statusFilter) {
  let filtered = getCustomers();
  if (statusFilter && statusFilter !== 'all') filtered = filtered.filter(c => c.status === statusFilter);
  if (query) filtered = filtered.filter(c => c.name.toLowerCase().includes(query) || c.furigana.toLowerCase().includes(query) || c.phone.includes(query) || c.email.toLowerCase().includes(query));
  const listEl = document.getElementById('customer-list');
  if (listEl) listEl.innerHTML = renderCustomerList(filtered, selectedCustomerId);
}

function switchCounselingTab(tabName, btn) {
  document.querySelectorAll('#tab-counsel-input, #tab-counsel-forms').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.tabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var el = document.getElementById('tab-' + tabName);
  if (el) el.classList.add('active');
  btn.classList.add('active');
}

var _formResponsesAll = [];
var _formResponsesHeaders = [];

async function loadFormResponses() {
  var container = document.getElementById('form-responses-container');
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">読み込み中...</div>';
  try {
    var res = await fetch(GAS_API_URL + '?action=getRawFormData');
    var json = await res.json();
    if (!json.ok || !Array.isArray(json.data) || json.data.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">データがありません</div>';
      return;
    }
    _formResponsesAll = json.data;
    _formResponsesHeaders = Object.keys(json.data[0]).filter(function(k) { return k.indexOf('_') !== 0; });
    updateFormFilterButtons();
    renderFormResponsesTable(_formResponsesAll);
  } catch(err) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">読み込みエラー: ' + err.message + '</div>';
  }
}

function updateFormFilterButtons() {
  var filterArea = document.getElementById('form-filter-buttons');
  if (!filterArea) return;
  var shops = {};
  _formResponsesAll.forEach(function(r) {
    if (r._shopCode && r._shopLabel) shops[r._shopCode] = r._shopLabel;
  });
  var html = '<button class="btn btn-secondary btn-sm form-filter-btn active" data-shop="all" onclick="filterFormResponses(\'all\', this)">全店舗</button>';
  Object.keys(shops).forEach(function(code) {
    html += '<button class="btn btn-secondary btn-sm form-filter-btn" data-shop="' + code + '" onclick="filterFormResponses(\'' + code + '\', this)">' + shops[code] + '</button>';
  });
  filterArea.innerHTML = html;
}

function filterFormResponses(shop, btn) {
  document.querySelectorAll('.form-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var filtered = shop === 'all' ? _formResponsesAll : _formResponsesAll.filter(function(c) {
    return c._shopCode === shop;
  });
  renderFormResponsesTable(filtered);
}

function renderFormResponsesTable(rows) {
  var container = document.getElementById('form-responses-container');
  if (!container) return;
  if (!rows || rows.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">データがありません</div>';
    return;
  }
  var headers = _formResponsesHeaders || Object.keys(rows[0]).filter(function(k) { return k.indexOf('_') !== 0; });
  var html = '<div style="margin-bottom:12px;font-size:13px;color:var(--text-muted)">' + rows.length + '件表示中</div>';
  html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:1200px">';
  html += '<thead><tr style="background:var(--primary);color:#fff;position:sticky;top:0">';
  html += '<th style="padding:8px 6px;text-align:left;white-space:nowrap;min-width:100px">流入元</th>';
  for (var h = 0; h < headers.length; h++) {
    html += '<th style="padding:8px 6px;text-align:left;white-space:nowrap;min-width:80px">' + headers[h] + '</th>';
  }
  html += '<th style="padding:8px 6px;text-align:center;white-space:nowrap">詳細</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var bg = i % 2 === 0 ? '#fff' : '#f8faf9';
    var shopLabel = row._shopLabel || row._shopCode || '';
    html += '<tr style="background:' + bg + ';border-bottom:1px solid #e8ede9;cursor:pointer" onclick="openRawFormDetail(' + i + ')">';
    html += '<td style="padding:6px;white-space:nowrap"><span style="background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px">' + shopLabel + '</span></td>';
    for (var h2 = 0; h2 < headers.length; h2++) {
      var val = row[headers[h2]] || '';
      var display = val.length > 20 ? val.slice(0, 20) + '...' : val;
      html += '<td style="padding:6px;white-space:nowrap" title="' + val.replace(/"/g, '&quot;') + '">' + display + '</td>';
    }
    html += '<td style="padding:6px;text-align:center"><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openRawFormDetail(' + i + ')">詳細</button></td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function openRawFormDetail(idx) {
  var row = _formResponsesAll[idx];
  if (!row) return;
  var headers = _formResponsesHeaders || Object.keys(row).filter(function(k) { return k.indexOf('_') !== 0; });
  var modal = document.getElementById('raw-form-detail-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'raw-form-detail-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center';
    document.body.appendChild(modal);
  }
  var rows = '';
  rows += '<tr style="background:#f0f7f3"><td colspan="2" style="padding:10px 16px;font-weight:700;color:var(--primary)">流入元：' + (row._shopLabel || '') + '　LINEチャネル：' + (row._lineChannel || '') + '</td></tr>';
  for (var i = 0; i < headers.length; i++) {
    var val = row[headers[i]] || '';
    if (!val) continue;
    rows += '<tr style="border-bottom:1px solid #eee"><td style="padding:8px 16px;font-size:12px;color:#666;white-space:nowrap;min-width:200px">' + headers[i] + '</td><td style="padding:8px 16px;font-size:13px">' + val + '</td></tr>';
  }
  modal.innerHTML = '<div style="background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff">' +
    '<h3 style="margin:0;font-size:16px">カウンセリング詳細</h3>' +
    '<button onclick="document.getElementById(\'raw-form-detail-modal\').remove()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#666">×</button>' +
    '</div>' +
    '<table style="width:100%;border-collapse:collapse">' + rows + '</table>' +
    '</div>';
  modal.style.display = 'flex';
}

async function saveCustomerEdit(customerId) {
  var params = {
    action: 'updateCustomer',
    customerId: customerId,
    name: document.getElementById('edit-name').value,
    phone: document.getElementById('edit-phone').value,
    email: document.getElementById('edit-email').value,
    birthDate: document.getElementById('edit-birthdate').value,
    skinType: document.getElementById('edit-skintype').value,
    memo: document.getElementById('edit-memo').value
  };
  var query = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  var url = GAS_API_URL + '?' + query;
  try {
    var res = await fetch(url);
    var json = await res.json();
    if (json.ok) {
      document.getElementById('edit-customer-modal').remove();
      showToast('保存しました', 'success');
      loadFormResponses();
    } else {
      showToast('保存に失敗しました: ' + (json.data && json.data.error ? json.data.error : ''), 'error');
    }
  } catch(e) {
    showToast('通信エラーが発生しました', 'error');
  }
}

function changeCounselingCustomer(cid) { selectedCustomerId = cid; renderView('counseling'); }

function submitCounseling() {
  const cid = selectedCustomerId || (CUSTOMERS.length > 0 ? CUSTOMERS[0].id : null);
  if (!cid) { showToast('顧客が選択されていません', 'warning'); return; }
  const date = document.getElementById('counsel-date').value;
  const staff = document.getElementById('counsel-staff').value;
  const memo = document.getElementById('counsel-memo').value;
  const dateEl = document.getElementById('counsel-date');
  const staffEl = document.getElementById('counsel-staff');
  const memoEl = document.getElementById('counsel-memo');
  [dateEl, staffEl, memoEl].forEach(el => el && el.classList.remove('error'));
  let hasError = false;
  if (!date) { dateEl && dateEl.classList.add('error'); hasError = true; }
  if (!staff) { staffEl && staffEl.classList.add('error'); hasError = true; }
  if (!memo) { memoEl && memoEl.classList.add('error'); hasError = true; }
  if (hasError) { showToast('カウンセリング日・担当スタッフ・メモは必須です', 'error'); return; }
  saveCounseling({ customerId: cid, date, staffMemo: memo, goals: document.getElementById('counsel-goals').value, lifestyle: document.getElementById('counsel-lifestyle').value, allergies: document.getElementById('counsel-allergies').value, medicines: document.getElementById('counsel-medicines').value, followUpNeeded: document.getElementById('counsel-followup').checked });
  const content = document.getElementById('treat-content').value;
  const price = document.getElementById('treat-price').value;
  if (content) addTreatment({ customerId: cid, date, content, staff, price: parseInt(price) || 0, beforeImage: document.getElementById('treat-before').value, afterImage: document.getElementById('treat-after').value, memo: document.getElementById('treat-memo').value });
  showToast('カウンセリング記録を保存しました ✓', 'success');
  renderView('counseling');
}

      <div class="progress-bar-wrap" style="height:10px;">
        <div class="progress-bar" style="width:${score}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px;"><span>リスク</span><span>フォロー</span><span>購買意欲高</span></div>

async function sendLine(cid) {
  const customer = getCustomerById(cid);
  const lineUserId = (document.getElementById('line-user-id-input') || {}).value || customer.lineUserId;
  const message = (document.getElementById('line-message-preview') || {}).value || '';
  const beforeImage = (document.getElementById('before-image-url') || {}).value || '';
  const afterImage = (document.getElementById('after-image-url') || {}).value || '';
  await sendLineMessage(lineUserId, message, beforeImage, afterImage);
  if (lineUserId) {
    const msgType = (document.querySelector('.msg-type-btn.active') || {}).dataset && document.querySelector('.msg-type-btn.active').dataset.type || 'カスタム';
    const typeLabels = { thanks: 'お礼メッセージ', 'before-after': 'ビフォーアフター', followup: 'フォローアップ', custom: 'カスタム' };
    addLineHistory({ customerId: cid, customerName: customer.name, date: new Date().toISOString().split('T')[0], type: typeLabels[msgType] || 'カスタム', message });
  }

async function sendLineMessage(lineUserId, message, beforeImage, afterImage) {
  if (!lineUserId) { showToast('LINE User IDが設定されていません', 'error'); return; }
  const btn = document.getElementById('line-send-btn');
  if (btn) { btn.innerHTML = '<span class="spinner"></span> 送信中...'; btn.classList.add('btn-loading'); }
  const messages = [{ type: 'text', text: message }];
  if (beforeImage) { messages.push({ type: 'image', originalContentUrl: beforeImage, previewImageUrl: beforeImage }); messages.push({ type: 'text', text: '⬆️ ビフォー' }); }
  if (afterImage) { messages.push({ type: 'image', originalContentUrl: afterImage, previewImageUrl: afterImage }); messages.push({ type: 'text', text: '⬆️ アフター' }); }
  const result = await apiSendLine(lineUserId, messages);
  if (btn) { btn.innerHTML = '💬 LINEで送信する'; btn.classList.remove('btn-loading'); }
  if (result && result.ok) showToast('LINEメッセージを送信しました ✓', 'success');
  else { const errMsg = result && result.error ? result.error : '送信に失敗しました'; showToast(errMsg, 'error'); }
}

// ============================================================
// BIND VIEW EVENTS
// ============================================================
function bindViewEvents(view) {
  if (view === 'customers') {
    const searchInput = document.getElementById('customer-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase();
        const statusFilter = (document.querySelector('.filter-btn.active') || {}).dataset && document.querySelector('.filter-btn.active').dataset.status || 'all';
        filterCustomerList(q, statusFilter);
      });
    }
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const q = ((document.getElementById('customer-search') || {}).value || '').toLowerCase();
        filterCustomerList(q, btn.dataset.status);
      });
    });
    if (selectedCustomerId) selectCustomer(selectedCustomerId);
  }
  if (view === 'retrospective') {
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        showToast(btn.textContent + 'のデータを表示しています', 'info');
      });
    });
  }
}

// ============================================================
// MODAL
// ============================================================
function showModal(title, bodyHtml, buttons) {
  const overlay = document.getElementById('modal-overlay');
  const container = document.getElementById('modal-container');
  const btnHtml = (buttons || []).map(b => '<button class="btn ' + b.cls + '" onclick="' + b.action + '">' + b.label + '</button>').join('');
  container.innerHTML = '<div class="modal-header"><span class="modal-title">' + title + '</span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body">' + bodyHtml + '</div><div class="modal-footer">' + btnHtml + '</div>';
  overlay.classList.remove('hidden');
  container.classList.remove('hidden');
  overlay.onclick = closeModal;
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); document.getElementById('modal-container').classList.add('hidden'); }

// ============================================================
// TOAST
// ============================================================
let toastTimer = null;
function showToast(message, type) {
  type = type || 'success';
  const toast = document.getElementById('toast');
  const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
  toast.innerHTML = '<span>' + (icons[type] || '✓') + '</span> ' + message;
  toast.className = 'toast ' + type;
  toast.classList.remove('hidden');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.add('hidden'), 3000);
}
