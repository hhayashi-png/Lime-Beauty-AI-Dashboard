<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lime Beauty 電子カルテ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh}
:root{--primary:#2d6a4f;--primary-light:#40916c;--primary-dark:#1b4332;--bg:#f0f4f0;--card:#fff;--border:#d8e4d8;--text:#1a1a1a;--text-sub:#666;--success:#2d6a4f;--error:#d32f2f;--warn:#f9a825}

/* Header */
.header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.header-sub{font-size:11px;opacity:.8}
.btn-refresh{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;transition:.2s}
.btn-refresh:hover{background:rgba(255,255,255,.35)}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:56px;z-index:99}
.tab{flex:1;text-align:center;padding:12px 0;font-size:13px;font-weight:600;color:var(--text-sub);cursor:pointer;border-bottom:3px solid transparent;transition:.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);background:#f0f8f0}

/* Content */
.content{padding:12px;max-width:800px;margin:0 auto}
.tab-content{display:none}
.tab-content.active{display:block}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,106,79,.15)}

/* Cards */
.card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:.2s;border-left:4px solid var(--primary)}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.card-name{font-size:16px;font-weight:700;color:var(--primary-dark)}
.card-furigana{font-size:11px;color:var(--text-sub);margin-bottom:2px}
.card-meta{display:flex;gap:12px;margin-top:6px;font-size:12px;color:var(--text-sub);flex-wrap:wrap}
.card-meta span{display:flex;align-items:center;gap:3px}
.line-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.line-badge.connected{background:#e8f5e9;color:#2e7d32}
.line-badge.disconnected{background:#fce4ec;color:#c62828}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:#e3f2fd;color:#1565c0}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:600px;margin:20px auto;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:16px}
.modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.detail-row{display:flex;border-bottom:1px solid #f0f0f0;padding:10px 0}
.detail-label{width:100px;font-size:12px;color:var(--text-sub);font-weight:600;flex-shrink:0}
.detail-value{flex:1;font-size:14px;word-break:break-all}

/* Form Data Card */
.form-card{border-left-color:var(--primary-light)}
.form-card .card-shop{font-size:11px;background:#e8f5e9;color:var(--primary);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px}

/* LINE Tab */
.line-section{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.line-section label{display:block;font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:6px}
.line-section select,.line-section textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
.line-section select:focus,.line-section textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,106,79,.15)}
.btn-send{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.btn-send:hover{background:var(--primary-dark)}
.btn-send:disabled{background:#ccc;cursor:not-allowed}
.line-empty{text-align:center;padding:40px;color:var(--text-sub)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--error)}
.toast.warn{background:var(--warn);color:#333}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text-sub)}
.loading::after{content:'';display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty */
.empty{text-align:center;padding:40px;color:var(--text-sub)}
.empty-icon{font-size:40px;margin-bottom:8px}

/* Count */
.count-badge{font-size:12px;color:var(--text-sub);margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🌿 Lime Beauty</h1>
    <div class="header-sub">電子カルテ ダッシュボード</div>
  </div>
  <button class="btn-refresh" onclick="refreshCurrentTab()">🔄 更新</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="customers" onclick="switchTab('customers')">👥 顧客一覧</div>
  <div class="tab" data-tab="forms" onclick="switchTab('forms')">📋 カウンセリング</div>
  <div class="tab" data-tab="line" onclick="switchTab('line')">💬 LINE送信</div>
</div>

<!-- Tab 1: 顧客一覧 -->
<div class="content">
  <div id="tab-customers" class="tab-content active">
    <div class="search-bar">
      <input type="text" id="customer-search" placeholder="🔍 名前・電話番号で検索..." oninput="filterCustomers()">
    </div>
    <div class="count-badge" id="customer-count"></div>
    <div id="customer-list"><div class="loading">顧客データを読み込み中</div></div>
  </div>

  <!-- Tab 2: カウンセリング -->
  <div id="tab-forms" class="tab-content">
    <div class="search-bar">
      <input type="text" id="form-search" placeholder="🔍 名前で検索..." oninput="filterForms()">
    </div>
    <div class="count-badge" id="form-count"></div>
    <div id="form-list"><div class="loading">フォームデータを読み込み中</div></div>
  </div>

  <!-- Tab 3: LINE送信 -->
  <div id="tab-line" class="tab-content">
    <div id="line-content"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">詳細</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxUBsEzbrUcEZepMfAgEt34jIK3DQjYhDzXA1VFvSP4xvcM5BuW_u_qt4GClxzjBdp9/exec';

let customers = [];
let formData = [];

// ============================================================
// GAS API
// ============================================================
async function callGAS(action, params = {}) {
  let url = GAS_API_URL + '?action=' + action;
  Object.keys(params).forEach(k => {
    url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  });
  const res = await fetch(url);
  const json = await res.json();
  if (!json.ok) throw new Error(json.data?.error || json.error || 'GAS error');
  return json.data;
}

// ============================================================
// Tab Switching
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'customers' && customers.length === 0) loadCustomers();
  if (tab === 'forms' && formData.length === 0) loadForms();
  if (tab === 'line') renderLineTab();
}

function refreshCurrentTab() {
  const active = document.querySelector('.tab.active');
  if (!active) return;
  const tab = active.dataset.tab;
  if (tab === 'customers') { customers = []; loadCustomers(); }
  if (tab === 'forms') { formData = []; loadForms(); }
  if (tab === 'line') { customers = []; loadCustomers().then(() => renderLineTab()); }
}

// ============================================================
// Tab 1: 顧客一覧
// ============================================================
async function loadCustomers() {
  const el = document.getElementById('customer-list');
  el.innerHTML = '<div class="loading">顧客データを読み込み中</div>';
  try {
    const data = await callGAS('getCustomers');
    customers = Array.isArray(data) ? data : [];
    renderCustomers(customers);
  } catch (err) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>読み込みに失敗しました</div>';
    showToast('顧客データの取得に失敗: ' + err.message, 'error');
  }
}

function renderCustomers(list) {
  const el = document.getElementById('customer-list');
  document.getElementById('customer-count').textContent = list.length + '件の顧客';
  if (list.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>顧客が見つかりません</div>';
    return;
  }
  el.innerHTML = list.map((c, i) => `
    <div class="card" onclick="showCustomerDetail(${i})">
      <div class="card-furigana">${esc(c.furigana || '')}</div>
      <div class="card-name">${esc(c.name)}</div>
      <div class="card-meta">
        <span>📞 ${esc(c.phone || '未登録')}</span>
        <span>${c.lineUserId ? '<span class="line-badge connected">LINE連携済</span>' : '<span class="line-badge disconnected">LINE未連携</span>'}</span>
        <span class="status-badge">${esc(c.status || '新規')}</span>
      </div>
    </div>
  `).join('');
}

function filterCustomers() {
  const q = (document.getElementById('customer-search').value || '').toLowerCase();
  if (!q) { renderCustomers(customers); return; }
  const filtered = customers.filter(c =>
    (c.name || '').toLowerCase().includes(q) ||
    (c.furigana || '').toLowerCase().includes(q) ||
    (c.phone || '').includes(q)
  );
  renderCustomers(filtered);
}

function showCustomerDetail(idx) {
  const c = customers[idx];
  if (!c) return;
  document.getElementById('modal-title').textContent = c.name + ' 様';
  const concerns = Array.isArray(c.concerns) ? c.concerns : (c.concerns ? String(c.concerns).split(/[\/、,]/).map(s=>s.trim()).filter(Boolean) : []);
  document.getElementById('modal-body').innerHTML = `
    ${detailRow('顧客ID', c.id)}
    ${detailRow('氏名', c.name)}
    ${detailRow('よみがな', c.furigana)}
    ${detailRow('電話番号', c.phone)}
    ${detailRow('メール', c.email)}
    ${detailRow('生年月日', c.birthdate)}
    ${detailRow('年齢', c.age ? c.age + '歳' : '')}
    ${detailRow('肌タイプ', c.skinType)}
    ${detailRow('お悩み', concerns.join('、'))}
    ${detailRow('店舗', c.shop)}
    ${detailRow('LINE ID', c.lineUserId || '未設定')}
    ${detailRow('LINE流入', c.lineInflowDate)}
    ${detailRow('ステータス', c.status)}
    ${detailRow('メモ', c.memo)}
    ${detailRow('登録日', c.registeredDate)}
  `;
  document.getElementById('modal').classList.add('show');
}

// ============================================================
// Tab 2: カウンセリング
// ============================================================
async function loadForms() {
  const el = document.getElementById('form-list');
  el.innerHTML = '<div class="loading">フォームデータを読み込み中</div>';
  try {
    const data = await callGAS('getRawFormData');
    formData = Array.isArray(data) ? data : [];
    renderForms(formData);
  } catch (err) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>読み込みに失敗しました</div>';
    showToast('フォームデータの取得に失敗: ' + err.message, 'error');
  }
}

function renderForms(list) {
  const el = document.getElementById('form-list');
  document.getElementById('form-count').textContent = list.length + '件の回答';
  if (list.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>フォーム回答がありません</div>';
    return;
  }
  el.innerHTML = list.map((f, i) => {
    const name = findFormValue(f, ['お名前（姓）','姓','名前','氏名']) + ' ' + findFormValue(f, ['お名前（名）','名']);
    const phone = findFormValue(f, ['電話','TEL','携帯']);
    return `
      <div class="card form-card" onclick="showFormDetail(${i})">
        <div class="card-name">${esc(name.trim() || '名前なし')}</div>
        <div class="card-meta">
          <span>📞 ${esc(phone || '未記入')}</span>
          <span class="card-shop">${esc(f._shopLabel || '')}</span>
        </div>
      </div>
    `;
  }).join('');
}

function filterForms() {
  const q = (document.getElementById('form-search').value || '').toLowerCase();
  if (!q) { renderForms(formData); return; }
  const filtered = formData.filter(f => {
    const vals = Object.values(f).join(' ').toLowerCase();
    return vals.includes(q);
  });
  renderForms(filtered);
}

function showFormDetail(idx) {
  const f = formData[idx];
  if (!f) return;
  document.getElementById('modal-title').textContent = 'フォーム回答詳細';
  const skip = ['_shopCode', '_lineChannel'];
  document.getElementById('modal-body').innerHTML = Object.keys(f)
    .filter(k => !skip.includes(k) && f[k])
    .map(k => {
      const label = k.startsWith('_') ? k.replace('_', '') : k;
      return detailRow(label, f[k]);
    }).join('');
  document.getElementById('modal').classList.add('show');
}

function findFormValue(obj, keys) {
  for (const k of Object.keys(obj)) {
    for (const search of keys) {
      if (k.includes(search)) return obj[k] || '';
    }
  }
  return '';
}

// ============================================================
// Tab 3: LINE送信
// ============================================================
function renderLineTab() {
  const el = document.getElementById('line-content');
  const lineCustomers = customers.filter(c => c.lineUserId);
  if (lineCustomers.length === 0) {
    el.innerHTML = '<div class="line-empty"><div style="font-size:40px;margin-bottom:12px">💬</div><div>LINE連携済みの顧客がいません</div><div style="font-size:12px;margin-top:8px;color:#999">顧客がLINE友だち追加後、電話番号を送信すると連携されます</div></div>';
    return;
  }
  el.innerHTML = `
    <div class="line-section">
      <label>送信先</label>
      <select id="line-customer">
        ${lineCustomers.map(c => `<option value="${c.id}">${esc(c.name)}（${esc(c.phone || 'TELなし')}）</option>`).join('')}
      </select>
      <label>メッセージ</label>
      <textarea id="line-message" rows="5" placeholder="送信するメッセージを入力..."></textarea>
      <button class="btn-send" id="btn-line-send" onclick="sendLine()">💬 LINE送信</button>
    </div>
  `;
}

async function sendLine() {
  const customerId = document.getElementById('line-customer').value;
  const message = document.getElementById('line-message').value.trim();
  if (!message) { showToast('メッセージを入力してください', 'warn'); return; }
  const btn = document.getElementById('btn-line-send');
  btn.disabled = true;
  btn.textContent = '送信中...';
  try {
    const result = await callGAS('sendLine', { customerId, message });
    showToast(result.sentTo + ' さんに送信しました ✅', 'success');
    document.getElementById('line-message').value = '';
  } catch (err) {
    showToast('送信失敗: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '💬 LINE送信';
  }
}

// ============================================================
// Utilities
// ============================================================
function detailRow(label, value) {
  return `<div class="detail-row"><div class="detail-label">${esc(label)}</div><div class="detail-value">${esc(value || '—')}</div></div>`;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Init
document.addEventListener('DOMContentLoaded', () => loadCustomers());
</script>
</body>
</html>
